<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Yükleniyor</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;800&family=Space+Grotesk:wght@300;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['Space Grotesk', 'monospace'],
                    },
                    animation: {
                        'blob': 'blob 7s infinite',
                        'float': 'float 3s ease-in-out infinite',
                        'scan': 'scan 3s linear infinite',
                    },
                    keyframes: {
                        blob: {
                            '0%': { transform: 'translate(0px, 0px) scale(1)' },
                            '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                            '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                            '100%': { transform: 'translate(0px, 0px) scale(1)' },
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        scan: {
                            '0%': { top: '0%' },
                            '100%': { top: '100%' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #020617;
            color: #f8fafc;
            overflow: hidden;
        }
        .glass {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .scanner-line {
            height: 2px;
            background: linear-gradient(90deg, transparent, #fb7185, transparent);
            position: absolute;
            width: 100%;
            z-index: 20;
            opacity: 0.5;
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen font-sans p-6">

    <!-- Dinamik Arka Plan Blobları -->
    <div class="fixed top-0 -left-4 w-96 h-96 bg-blue-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-blob"></div>
    <div class="fixed top-0 -right-4 w-96 h-96 bg-purple-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-blob animation-delay-2000"></div>
    <div class="fixed -bottom-8 left-20 w-96 h-96 bg-rose-600 rounded-full mix-blend-screen filter blur-[100px] opacity-10 animate-blob animation-delay-4000"></div>

    <main class="relative z-10 w-full max-w-lg">
        <div class="glass rounded-[3rem] p-8 md:p-14 shadow-2xl text-center space-y-12 relative overflow-hidden">
            
            <!-- Tarama Efekti -->
            <div class="scanner-line animate-scan"></div>

            <!-- Merkezi İkon -->
            <div class="flex justify-center">
                <div class="relative">
                    <div class="w-20 h-20 rounded-2xl bg-white/5 border border-white/10 flex items-center justify-center animate-float">
                        <i class="fas fa-layer-group text-3xl text-rose-400"></i>
                    </div>
                    <!-- Küçük Sinyal Noktası -->
                    <div class="absolute -top-1 -right-1 flex h-4 w-4">
                        <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-rose-400 opacity-75"></span>
                        <span class="relative inline-flex rounded-full h-4 w-4 bg-rose-500 border-2 border-slate-900"></span>
                    </div>
                </div>
            </div>

            <!-- Ana Metin -->
            <div class="space-y-4">
                <h1 class="text-3xl md:text-4xl font-extrabold tracking-tight font-mono uppercase">
                    Erişim <span class="text-rose-400">Kısıtlı</span>
                </h1>
                <p class="text-slate-400 text-sm md:text-base font-light leading-relaxed max-w-xs mx-auto">
                    Yeni nesil deneyim için protokoller hazırlanıyor. Veri yapılandırması devam ediyor...
                </p>
            </div>

            <!-- Geliştiriliyor Rozeti -->
            <div class="inline-flex items-center space-x-3 px-6 py-2 bg-rose-500/10 rounded-full border border-rose-500/20">
                <span class="text-[10px] font-black uppercase tracking-[0.3em] text-rose-400">Geliştiriliyor</span>
            </div>

            <!-- İlerleme Çubuğu -->
            <div class="space-y-4 pt-2">
                <div class="flex justify-between text-[10px] uppercase font-bold tracking-widest text-slate-500">
                    <span class="animate-pulse">Sistem Optimizasyonu</span>
                    <span>%94</span>
                </div>
                <div class="w-full h-1 bg-slate-800 rounded-full overflow-hidden">
                    <div class="w-[94%] h-full bg-gradient-to-r from-rose-500 to-purple-600 shadow-[0_0_15px_rgba(244,63,94,0.5)]"></div>
                </div>
                <div class="flex justify-center space-x-2">
                    <div class="h-1 w-1 bg-rose-500 rounded-full animate-bounce" style="animation-delay: 0.1s"></div>
                    <div class="h-1 w-1 bg-rose-500 rounded-full animate-bounce" style="animation-delay: 0.2s"></div>
                    <div class="h-1 w-1 bg-rose-500 rounded-full animate-bounce" style="animation-delay: 0.3s"></div>
                </div>
            </div>

            <!-- Teknik İkonlar -->
            <div class="flex justify-center space-x-8 text-slate-500 pt-4">
                <i class="fas fa-terminal text-xs hover:text-rose-400 transition-colors"></i>
                <i class="fas fa-microchip text-xs hover:text-rose-400 transition-colors"></i>
                <i class="fas fa-database text-xs hover:text-rose-400 transition-colors"></i>
            </div>

        </div>

        <!-- Alt Bilgi (Anonim) -->
        <p class="mt-10 text-center text-[9px] text-slate-600 uppercase tracking-[0.6em]">
            Digital Assets // Terminal 2026
        </p>
    </main>

</body>
</html>
