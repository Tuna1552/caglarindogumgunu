<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyiki Doğdun Çağlar</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive']
                    },
                    colors: {
                        'primary-blue': '#2563eb',
                        'secondary-blue': '#60a5fa',
                        'bg-dark': '#0f172a',
                        'card-dark': '#1e293b',
                        'text-light': '#f1f5f9',
                        'accent-blue': '#38bdf8',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-in-out',
                        'pulse-grow': 'pulseGrow 1.5s ease-in-out infinite',
                        'light-up': 'lightUp 0.5s ease-out forwards',
                        'float': 'float 3s ease-in-out infinite',
                        'shine': 'shine 2s infinite',
                        'bounce-slow': 'bounce 3s infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGrow: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' }
                        },
                        lightUp: {
                            '0%': { 'background-color': '#2563eb' },
                            '100%': { 'background-color': '#93c5fd' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        },
                        shine: {
                            '0%': { transform: 'translateX(-100%)' },
                            '100%': { transform: 'translateX(100%)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            overflow-y: auto;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }
        .ui-container {
            position: relative;
            z-index: 10;
        }
        .nav-icon {
            transition: transform 0.3s ease-in-out;
        }
        .nav-button:hover .nav-icon {
            transform: translateY(-5px);
        }
        .password-page-transition {
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .password-page-hidden {
            transform: scale(0.8) translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }
        .lighted-star {
            background-color: #2563eb !important;
            animation: lightUp 0.5s ease-out forwards;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        .memory-card {
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .memory-card:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 25px rgba(37, 99, 235, 0.15);
        }
        /* Glass Panel Styling */
        .glass-panel {
            background: rgba(30, 41, 59, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        .signature-gradient {
            background: linear-gradient(to right, #60a5fa, #f1f5f9, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
        }
        /* Envelope Animation Classes */
        .envelope-transition {
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.5s ease;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <canvas id="particles-canvas"></canvas>

    <div class="ui-container flex flex-col min-h-screen">
        <!-- Password Page -->
        <div id="password-page" class="flex flex-col items-center justify-center flex-1 p-4 text-center password-page-transition">
            <div class="w-full max-w-sm p-8 bg-card-dark rounded-3xl shadow-2xl backdrop-blur-md border border-gray-700">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-secondary-blue drop-shadow-lg animate-pulse-grow">Merhaba, Çağlar!</h1>
                <p class="text-md text-gray-400 mb-6 font-light">
                    Siteye girmek için mavi yıldızları doğru sırayla takip et (yoğun güvenlikli)
                </p>
                <div id="heart-grid" class="grid grid-cols-3 gap-4 max-w-xs mx-auto mb-6 min-h-[150px]">
                    <!-- Buttons generated by JS -->
                </div>
                <button id="start-button" class="w-full py-3 rounded-2xl font-bold text-white bg-gradient-to-r from-primary-blue to-accent-blue hover:from-accent-blue hover:to-primary-blue transition-all duration-300 transform hover:scale-105 shadow-lg">
                    Şifreyi Göster
                </button>
                <p id="feedback-message" class="mt-4 text-blue-300 font-medium hidden">
                    Yanlış seçim, tekrar dene.
                </p>
            </div>
        </div>

        <!-- Main Application Container -->
        <div id="app-container" class="hidden flex-1 flex flex-col p-4 md:p-8 relative">
            <div id="content-area" class="flex-1 flex flex-col items-center justify-center text-center p-2 md:p-4 w-full"></div>

            <!-- Mobile Navigation -->
            <nav class="fixed bottom-0 left-0 w-full bg-card-dark bg-opacity-90 backdrop-blur-lg border-t border-gray-700 flex justify-around items-center h-16 shadow-2xl z-20 md:hidden">
                <button id="nav-home" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-secondary-blue font-semibold p-2">
                    <i class="fas fa-home text-xl nav-icon"></i>
                    <span class="mt-1">Menü</span>
                </button>
                <button id="nav-memories" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold p-2">
                    <i class="fas fa-camera text-xl nav-icon"></i>
                    <span class="mt-1">Anılar</span>
                </button>
                <button id="nav-message" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold p-2">
                    <i class="fas fa-envelope-open-text text-xl nav-icon"></i>
                    <span class="mt-1">Mesaj</span>
                </button>
            </nav>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex fixed bottom-0 left-0 right-0 w-full justify-center p-4">
                <div class="flex gap-4 p-2 bg-card-dark rounded-full shadow-2xl border border-gray-700 backdrop-blur-lg">
                    <button id="nav-home-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold bg-primary-blue shadow-lg">
                        <i class="fas fa-home mr-2"></i> Menü
                    </button>
                    <button id="nav-memories-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700">
                        <i class="fas fa-camera mr-2"></i> Anılar
                    </button>
                    <button id="nav-message-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700">
                        <i class="fas fa-envelope-open-text mr-2"></i> Mesajım
                    </button>
                </div>
            </nav>
        </div>
    </div>
    
    <script>
        const birthdayDate = new Date('April 26, 2026 00:00:00').getTime();
        let sequence = [];
        let userSequence = [];
        const heartButtonCount = 9;
        let isPlaying = false;
        
        const passwordPage = document.getElementById('password-page');
        const appContainer = document.getElementById('app-container');
        const heartGrid = document.getElementById('heart-grid');
        const startButton = document.getElementById('start-button');
        const feedbackMessage = document.getElementById('feedback-message');
        const contentArea = document.getElementById('content-area');

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleColors = ['#2563eb', '#60a5fa', '#38bdf8', '#0ea5e9'];

        const homePageContent = `
            <div class="flex flex-col md:flex-row items-center justify-center w-full max-w-5xl animate-fade-in">
                <div class="flex-1 text-center md:text-left md:pr-8 mb-8 md:mb-0">
                    <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-primary-blue drop-shadow-xl">
                        İyi ki Doğdun, Çağlar!
                    </h1>
                    <p id="countdown-text" class="mt-4 text-xl md:text-3xl lg:text-4xl font-light text-text-light">
                        26 Nisan 2026'ya sadece...
                    </p>
                </div>
                <div class="flex-1 grid grid-cols-2 gap-4 w-full">
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="days" class="text-4xl md:text-6xl font-extrabold text-accent-blue tabular-nums">0</span>
                        <span class="text-xs text-gray-400 mt-2 text-center">GÜN</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="hours" class="text-4xl md:text-6xl font-extrabold text-accent-blue tabular-nums">0</span>
                        <span class="text-xs text-gray-400 mt-2 text-center">SAAT</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="minutes" class="text-4xl md:text-6xl font-extrabold text-accent-blue tabular-nums">0</span>
                        <span class="text-xs text-gray-400 mt-2 text-center">DAKİKA</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="seconds" class="text-4xl md:text-6xl font-extrabold text-accent-blue tabular-nums">0</span>
                        <span class="text-xs text-gray-400 mt-2 text-center">SANİYE</span>
                    </div>
                </div>
            </div>
        `;

        const memoriesPageContent = `
            <div class="w-full max-w-6xl animate-fade-in pb-24 md:pb-32">
                <div class="bg-card-dark rounded-3xl p-6 mb-8 text-center relative overflow-hidden shadow-2xl border border-gray-700 mx-2">
                    <div class="absolute inset-0 bg-primary-blue opacity-10 blur-xl animate-pulse"></div>
                    <h2 class="text-2xl md:text-3xl font-bold text-primary-blue mb-1 relative z-10">Güzel Anılarımız</h2>
                    <p class="text-xs md:text-lg font-light text-gray-400 relative z-10">
                        Zaman geçse de bu anlar hep bizimle kalacak...
                    </p>
                </div>
                
                <!-- Masonry-like Grid for many photos -->
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3 md:gap-6 px-2">
                    <!-- Fotoğraf 1 -->
                    <div class="memory-card bg-card-dark rounded-2xl md:rounded-[2rem] overflow-hidden border border-white/5 shadow-xl group">
                        <div class="relative aspect-square md:aspect-[3/4] overflow-hidden">
                            <img src="https://i.ibb.co/X9Zmx2s/ciktfoto.jpg" alt="Anı Fotoğrafı" class="w-full h-full object-cover">
                            <div class="absolute inset-0 bg-gradient-to-t from-bg-dark/80 via-transparent to-transparent opacity-80 md:opacity-0 group-hover:opacity-100 transition-opacity duration-300"></div>
                            <div class="absolute bottom-2 left-2 right-2 md:bottom-4 md:left-4 text-left">
                                <h3 class="text-white font-bold text-[10px] md:text-lg leading-tight">Pi Günü</h3>
                                <p class="text-gray-300 text-[8px] md:text-xs italic hidden md:block">14 Mart</p>
                            </div>
                        </div>
                    </div>

                    <!-- Buraya kopyalayarak 20+ fotoğraf ekleyebilirsin. Örnek boş kart: -->
                    <div class="memory-card bg-card-dark rounded-2xl md:rounded-[2rem] overflow-hidden border border-white/5 shadow-xl flex items-center justify-center aspect-square md:aspect-[3/4]">
                         <div class="text-center p-4">
                            <i class="fas fa-plus-circle text-xl md:text-4xl mb-2 opacity-20 text-blue-400"></i>
                            <p class="text-[8px] md:text-sm font-medium text-gray-500 uppercase tracking-widest">Gelecek Anılar</p>
                         </div>
                    </div>
                    
                    <!-- Tekrar eden örnek kartlar (Görünümü test etmek için) -->
                    ${Array(18).fill('').map((_, i) => `
                        <div class="memory-card bg-card-dark rounded-2xl md:rounded-[2rem] overflow-hidden border border-white/5 shadow-xl aspect-square md:aspect-[3/4] flex items-center justify-center opacity-40">
                             <i class="fas fa-camera text-xl md:text-2xl text-gray-700"></i>
                        </div>
                    `).join('')}
                </div>
            </div>
        `;

        const messagePageContent = `
            <div class="w-full max-w-4xl mx-auto flex flex-col items-center animate-fade-in text-center pb-32 pt-4 px-4 min-h-[70vh] justify-center">
                <!-- Interactive Envelope -->
                <div id="envelope-wrapper" class="relative w-full max-w-sm aspect-[4/3] group cursor-pointer envelope-transition">
                    <div class="absolute inset-0 bg-gradient-to-br from-blue-600 to-blue-900 rounded-2xl shadow-2xl border border-white/10 overflow-hidden">
                        <!-- Envelope Flap -->
                        <div class="absolute top-0 left-0 w-full h-1/2 bg-blue-500/30 origin-top transform group-hover:rotate-x-180 transition-transform duration-700 z-20 border-b border-white/5"></div>
                        <!-- Decorative Seal -->
                        <div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-16 h-16 bg-white/10 rounded-full backdrop-blur-xl border border-white/20 flex items-center justify-center z-30 shadow-inner group-hover:scale-110 transition-transform duration-500">
                            <i class="fas fa-heart text-blue-400 text-2xl animate-pulse"></i>
                        </div>
                        <!-- Lines -->
                        <div class="absolute inset-0 flex flex-col justify-around p-8 opacity-20">
                            <div class="h-px bg-white w-3/4"></div>
                            <div class="h-px bg-white w-1/2"></div>
                            <div class="h-px bg-white w-full"></div>
                        </div>
                    </div>
                    <!-- Label -->
                    <div class="absolute -bottom-16 left-0 w-full text-center">
                        <p class="text-blue-300/60 uppercase tracking-[0.3em] text-[10px] font-bold mb-3 animate-bounce-slow">Senin İçin Bir Mesaj Var</p>
                        <button id="show-message-btn" class="relative px-10 py-4 bg-white/5 hover:bg-white/10 border border-white/10 rounded-full font-black text-white text-xs uppercase tracking-widest transition-all hover:scale-105 active:scale-95 group shadow-xl">
                            <span class="relative z-10">Mektubu Aç</span>
                            <div class="absolute inset-0 bg-gradient-to-r from-primary-blue/20 to-transparent opacity-0 group-hover:opacity-100 transition-opacity rounded-full"></div>
                        </button>
                    </div>
                </div>
                
                <!-- Expanded Letter Content -->
                <div id="all-messages-container" class="hidden w-full max-w-3xl text-left">
                    <div class="glass-panel rounded-[3rem] p-10 md:p-16 relative overflow-hidden">
                        <!-- Abstract Background Decoration -->
                        <div class="absolute -top-24 -right-24 w-64 h-64 bg-primary-blue/10 rounded-full blur-3xl"></div>
                        <div class="absolute -bottom-24 -left-24 w-64 h-64 bg-accent-blue/10 rounded-full blur-3xl"></div>
                        
                        <!-- Content -->
                        <div class="relative z-10">
                            <div id="typed-text-content" class="text-gray-200 leading-relaxed text-lg md:text-xl font-light selection:bg-blue-500/30"></div>
                            <div id="signature-area" class="hidden mt-16 pt-10 border-t border-white/10 opacity-0 transition-opacity duration-1000"></div>
                        </div>
                    </div>
                    
                    <!-- Close/Back Button -->
                    <div class="mt-8 flex justify-center">
                        <button onclick="renderPage('message')" class="text-gray-500 hover:text-gray-300 text-xs uppercase tracking-widest transition-colors flex items-center">
                            <i class="fas fa-redo-alt mr-2 text-[10px]"></i> Yeniden Oku
                        </button>
                    </div>
                </div>
            </div>
        `;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 2 + 1,
                color: particleColors[Math.floor(Math.random() * particleColors.length)],
                opacity: Math.random()
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y += p.speed;
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            if (particles.length < 50) createParticle();
            requestAnimationFrame(animate);
        }

        function renderPage(pageName) {
            window.scrollTo(0, 0);
            contentArea.classList.add('opacity-0');
            setTimeout(() => {
                if (pageName === 'home') contentArea.innerHTML = homePageContent;
                else if (pageName === 'memories') contentArea.innerHTML = memoriesPageContent;
                else if (pageName === 'message') {
                    contentArea.innerHTML = messagePageContent;
                    setTimeout(attachMessageButtonListener, 100);
                }
                updateCountdown();
                setActiveNav(pageName);
                contentArea.classList.remove('opacity-0');
            }, 300);
        }

        function setActiveNav(pageName) {
            const navIds = ['home', 'memories', 'message'];
            navIds.forEach(id => {
                const elMobile = document.getElementById('nav-' + id);
                const elDesk = document.getElementById('nav-' + id + '-desktop');
                if (elMobile) elMobile.classList.toggle('text-secondary-blue', id === pageName);
                if (elDesk) elDesk.classList.toggle('bg-primary-blue', id === pageName);
            });
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = birthdayDate - now;
            if (distance > 0) {
                const d = Math.floor(distance / (86400000));
                const h = Math.floor((distance % 86400000) / 3600000);
                const m = Math.floor((distance % 3600000) / 60000);
                const s = Math.floor((distance % 60000) / 1000);
                ['days', 'hours', 'minutes', 'seconds'].forEach((id, i) => {
                    const el = document.getElementById(id);
                    if (el) el.innerText = [d, h, m, s][i];
                });
            }
        }

        async function typeMessage() {
            const container = document.getElementById('typed-text-content');
            const signatureArea = document.getElementById('signature-area');
            
            const lines = [
                { text: "Merhaba Çağlar,", style: "text-3xl font-extrabold mb-10 text-white tracking-tight" },
                { text: "Bugün senin doğum günün... Arkadaşların olarak her anında yanında olacağımızı bilmen adına böyle bir site yapmak istedik, umarız beğenmişsindir.", style: "mb-6 italic text-blue-200" },
                { text: "Senin gibi dürüst, içten ve değerli birini tanımış olmak bizim için gerçekten büyük ve güzel bir şans. Doğum gününü en içten dileklerimizle kutluyoruz ve her zaman mutluluğunu diliyoruz.", style: "mb-6" },
                { text: "Doğruları konuşmak gerekirse; kalbinin güzelliği hem yüzüne hem de mizahına vurmuş. Çok eğlenceli, güzel ve sevdiklerine değer veren birisin. Bu yüzden varlığın gerçekten içimizi ısıtıyor.", style: "mb-6 font-medium" },
                { text: "Ne zaman moralimiz bozuk olsa bizi bir şekilde güldürmeyi başardığın için sana tüm içtenliğimizle teşekkür ederiz. İyi ki arkadaşımızsın.", style: "mb-6" },
                { text: "Bizler için çok değerli bir arkadaş olduğunu ve her zaman öyle olacağını hiçbir zaman unutma. 💎 İyi ki varsın Çağlar, iyi ki doğmuşsun, iyi ki seninle tanışmışız ve iyi ki bizimlesin. Daha nice yaşlar diliyoruz.", style: "text-blue-100 font-semibold mb-6" }
            ];

            container.innerHTML = "";
            for (let lineObj of lines) {
                const p = document.createElement('p');
                p.className = lineObj.style;
                container.appendChild(p);
                for (let char of lineObj.text) {
                    p.innerHTML += char;
                    await new Promise(r => setTimeout(r, 20));
                }
                await new Promise(r => setTimeout(r, 200));
            }

            // Signature area
            signatureArea.classList.remove('hidden');
            signatureArea.innerHTML = `
                <div class="flex flex-col items-end text-right">
                    <span class="text-[10px] text-blue-400 uppercase tracking-[0.6em] mb-4 font-black">Sonsuz Sevgilerimizle</span>
                    <h3 class="font-cursive text-4xl md:text-6xl signature-gradient py-2">
                        Tuna, İsmet, Kumsal ve Benna
                    </h3>
                </div>
            `;
            setTimeout(() => signatureArea.style.opacity = '1', 100);
        }

        function attachMessageButtonListener() {
            const wrapper = document.getElementById('envelope-wrapper');
            const btn = document.getElementById('show-message-btn');
            const box = document.getElementById('all-messages-container');
            
            const openAction = () => {
                wrapper.style.transform = "scale(1.2) translateY(-20px)";
                wrapper.style.opacity = "0";
                setTimeout(() => {
                    wrapper.classList.add('hidden');
                    box.classList.remove('hidden');
                    typeMessage();
                }, 600);
            };

            if (btn) btn.onclick = (e) => { e.stopPropagation(); openAction(); };
            if (wrapper) wrapper.onclick = openAction;
        }

        function createHeartButtons() {
            heartGrid.innerHTML = '';
            for (let i = 0; i < heartButtonCount; i++) {
                const b = document.createElement('button');
                b.className = 'star-btn aspect-square bg-gray-700 rounded-full flex items-center justify-center text-2xl text-primary-blue hover:bg-gray-600 transition-all active:scale-90';
                b.innerHTML = '<i class="fas fa-star"></i>';
                b.onclick = () => {
                    if (isPlaying) return;
                    userSequence.push(i);
                    b.classList.add('lighted-star');
                    setTimeout(() => b.classList.remove('lighted-star'), 400);
                    if (userSequence.length === sequence.length) {
                        if (userSequence.every((v, j) => v === sequence[j])) {
                            passwordPage.classList.add('password-page-hidden');
                            setTimeout(() => {
                                passwordPage.classList.add('hidden');
                                appContainer.classList.remove('hidden');
                                renderPage('home');
                            }, 500);
                        } else {
                            feedbackMessage.classList.remove('hidden');
                            userSequence = [];
                            setTimeout(() => feedbackMessage.classList.add('hidden'), 2000);
                        }
                    }
                };
                heartGrid.appendChild(b);
            }
        }

        startButton.onclick = () => {
            sequence = Array.from({length: 4}, () => Math.floor(Math.random() * 9));
            isPlaying = true;
            let step = 0;
            const btns = document.querySelectorAll('.star-btn');
            const interval = setInterval(() => {
                if (step < sequence.length) {
                    const b = btns[sequence[step]];
                    b.classList.add('lighted-star');
                    setTimeout(() => b.classList.remove('lighted-star'), 500);
                    step++;
                } else {
                    clearInterval(interval);
                    isPlaying = false;
                }
            }, 800);
        };

        ['home', 'memories', 'message'].forEach(p => {
            const el = document.getElementById('nav-' + p);
            const elD = document.getElementById('nav-' + p + '-desktop');
            if(el) el.onclick = () => renderPage(p);
            if(elD) elD.onclick = () => renderPage(p);
        });

        window.onload = () => {
            resizeCanvas();
            animate();
            createHeartButtons();
            setInterval(updateCountdown, 1000);
        };
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
