<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyiki Doğdun Çağlar</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive']
                    },
                    colors: {
                        'primary-blue': '#2563eb',
                        'secondary-blue': '#60a5fa',
                        'bg-dark': '#0f172a',
                        'card-dark': '#1e293b',
                        'text-light': '#f1f5f9',
                        'accent-blue': '#38bdf8',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-in-out',
                        'pulse-grow': 'pulseGrow 1.5s ease-in-out infinite',
                        'light-up': 'lightUp 0.5s ease-out forwards',
                        'float': 'float 3s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGrow: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' }
                        },
                        lightUp: {
                            '0%': { 'background-color': '#2563eb' },
                            '100%': { 'background-color': '#93c5fd' }
                        },
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
            overflow-y: auto;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }
        .ui-container {
            position: relative;
            z-index: 10;
        }
        .nav-icon {
            transition: transform 0.3s ease-in-out;
        }
        .nav-button:hover .nav-icon {
            transform: translateY(-5px);
        }
        .password-page-transition {
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .password-page-hidden {
            transform: scale(0.8) translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }
        .lighted-star {
            background-color: #2563eb !important;
            animation: lightUp 0.5s ease-out forwards;
        }
        /* Custom scrollbar for better look */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #0f172a;
        }
        ::-webkit-scrollbar-thumb {
            background: #1e293b;
            border-radius: 10px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #2563eb;
        }
        .message-gradient-text {
            background: linear-gradient(to right, #60a5fa, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen">

    <canvas id="particles-canvas"></canvas>

    <div class="ui-container flex flex-col min-h-screen">
        <!-- Password Page -->
        <div id="password-page" class="flex flex-col items-center justify-center flex-1 p-4 text-center password-page-transition">
            <div class="w-full max-w-sm p-8 bg-card-dark rounded-3xl shadow-2xl backdrop-blur-md border border-gray-700">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-secondary-blue drop-shadow-lg animate-pulse-grow">Merhaba, Çağlar!</h1>
                <p class="text-md text-gray-400 mb-6 font-light">
                    Siteye girmek için mavi yıldızları doğru sırayla takip et (yoğun güvenlikli)
                </p>
                <div id="heart-grid" class="grid grid-cols-3 gap-4 max-w-xs mx-auto mb-6 min-h-[150px]">
                    <!-- Butonlar JS ile eklenecek -->
                </div>
                <button id="start-button" class="w-full py-3 rounded-2xl font-bold text-white bg-gradient-to-r from-primary-blue to-accent-blue hover:from-accent-blue hover:to-primary-blue transition-all duration-300 transform hover:scale-105 shadow-lg">
                    Şifreyi Göster
                </button>
                <p id="feedback-message" class="mt-4 text-blue-300 font-medium hidden">
                    Yanlış seçim, tekrar dene.
                </p>
            </div>
        </div>

        <!-- Main Application Container -->
        <div id="app-container" class="hidden flex-1 flex flex-col p-4 md:p-8 relative">
            <div id="content-area" class="flex-1 flex flex-col items-center justify-center text-center p-4"></div>

            <!-- Mobile Navigation -->
            <nav class="fixed bottom-0 left-0 w-full bg-card-dark bg-opacity-90 backdrop-blur-lg border-t border-gray-700 flex justify-around items-center h-16 shadow-2xl z-20 md:hidden">
                <button id="nav-home" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-secondary-blue font-semibold p-2">
                    <i class="fas fa-home text-xl nav-icon"></i>
                    <span class="mt-1">Menü</span>
                </button>
                <button id="nav-memories" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold p-2">
                    <i class="fas fa-camera text-xl nav-icon"></i>
                    <span class="mt-1">Anılar</span>
                </button>
                <button id="nav-message" class="nav-button flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold p-2">
                    <i class="fas fa-envelope-open-text text-xl nav-icon"></i>
                    <span class="mt-1">Mesaj</span>
                </button>
            </nav>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex fixed bottom-0 left-0 right-0 w-full justify-center p-4">
                <div class="flex gap-4 p-2 bg-card-dark rounded-full shadow-2xl border border-gray-700 backdrop-blur-lg">
                    <button id="nav-home-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold bg-primary-blue shadow-lg">
                        <i class="fas fa-home mr-2"></i> Menü
                    </button>
                    <button id="nav-memories-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700">
                        <i class="fas fa-camera mr-2"></i> Anılar
                    </button>
                    <button id="nav-message-desktop" class="nav-button flex items-center px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700">
                        <i class="fas fa-envelope-open-text mr-2"></i> Mesajım
                    </button>
                </div>
            </nav>
        </div>
    </div>
    
    <script>
        const birthdayDate = new Date('April 26, 2026 00:00:00').getTime();
        let sequence = [];
        let userSequence = [];
        const heartButtonCount = 9;
        let isPlaying = false;
        
        const passwordPage = document.getElementById('password-page');
        const appContainer = document.getElementById('app-container');
        const heartGrid = document.getElementById('heart-grid');
        const startButton = document.getElementById('start-button');
        const feedbackMessage = document.getElementById('feedback-message');
        const contentArea = document.getElementById('content-area');

        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        const particleColors = ['#2563eb', '#60a5fa', '#38bdf8', '#0ea5e9'];

        const homePageContent = `
            <div class="flex flex-col md:flex-row items-center justify-center w-full max-w-5xl">
                <div class="flex-1 text-center md:text-left md:pr-8 mb-8 md:mb-0">
                    <h1 class="text-5xl md:text-6xl lg:text-7xl font-extrabold text-primary-blue animate-fade-in drop-shadow-xl">
                        İyi ki Doğdun, Çağlar!
                    </h1>
                    <p id="countdown-text" class="mt-4 text-xl md:text-3xl lg:text-4xl font-light text-text-light animate-fade-in delay-200">
                        26 Nisan 2026'ya sadece...
                    </p>
                </div>
                <div class="flex-1 grid grid-cols-2 gap-4 w-full animate-fade-in delay-300">
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="days" class="text-4xl md:text-6xl font-extrabold text-accent-blue">0</span>
                        <span class="text-xs text-gray-400 mt-2">GÜN</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="hours" class="text-4xl md:text-6xl font-extrabold text-accent-blue">0</span>
                        <span class="text-xs text-gray-400 mt-2">SAAT</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="minutes" class="text-4xl md:text-6xl font-extrabold text-accent-blue">0</span>
                        <span class="text-xs text-gray-400 mt-2">DAKİKA</span>
                    </div>
                    <div class="flex flex-col items-center p-6 bg-card-dark rounded-2xl shadow-lg border border-gray-700">
                        <span id="seconds" class="text-4xl md:text-6xl font-extrabold text-accent-blue">0</span>
                        <span class="text-xs text-gray-400 mt-2">SANİYE</span>
                    </div>
                </div>
            </div>
        `;

        const memoriesPageContent = `
            <div class="w-full max-w-5xl animate-fade-in">
                <div class="bg-card-dark rounded-3xl p-6 mb-12 text-center relative overflow-hidden shadow-2xl border border-gray-700">
                    <div class="absolute inset-0 bg-primary-blue opacity-10 blur-xl animate-pulse"></div>
                    <h2 class="text-3xl font-bold text-primary-blue mb-4 relative z-10">Anılar</h2>
                    <p class="text-lg font-light text-gray-300 relative z-10">
                        Geçirdiğimiz güzel anları burada toplamaya çalıştım, iyi ki varsın Çağlarcım
                    </p>
                </div>
                <div class="flex flex-col items-center justify-center p-12 text-gray-500 italic">
                    <i class="fas fa-images text-6xl mb-4 opacity-20"></i>
                    <p>Henüz fotoğraf eklenmedi.</p>
                </div>
            </div>
        `;

        const messagePageContent = `
            <div class="w-full max-w-3xl mx-auto flex flex-col items-center animate-fade-in text-center pb-32 pt-8">
                <div class="relative mb-10 group">
                    <div class="absolute -inset-2 bg-gradient-to-r from-primary-blue to-accent-blue rounded-full opacity-75 blur group-hover:opacity-100 transition duration-1000 group-hover:duration-200 animate-pulse"></div>
                    <div class="relative bg-card-dark w-24 h-24 rounded-full flex items-center justify-center shadow-2xl border border-gray-700">
                        <i class="fas fa-heart text-4xl text-primary-blue animate-float"></i>
                    </div>
                </div>
                
                <div id="message-container-wrapper" class="w-full px-4">
                    <button id="show-message-btn" class="w-full py-6 rounded-3xl font-black text-white text-xl bg-gradient-to-r from-primary-blue to-secondary-blue hover:from-secondary-blue hover:to-primary-blue transition-all duration-500 shadow-2xl border border-white/10 group overflow-hidden relative">
                        <span class="relative z-10 flex items-center justify-center">
                            <i class="fas fa-envelope-open-text mr-3 text-2xl group-hover:rotate-12 transition-transform"></i> 
                            SANA ÖZEL NOTU OKU
                        </span>
                        <div class="absolute inset-0 bg-white/10 opacity-0 group-hover:opacity-100 transition-opacity"></div>
                    </button>
                    
                    <div id="all-messages-container" class="hidden relative">
                        <div class="absolute -top-6 left-1/2 -translate-x-1/2 w-0.5 h-6 bg-gradient-to-b from-primary-blue/50 to-transparent"></div>
                        <div class="bg-card-dark/80 backdrop-blur-xl rounded-[2.5rem] p-8 md:p-12 text-left shadow-[0_20px_50px_rgba(0,0,0,0.5)] border border-white/5 relative overflow-hidden">
                            <div class="absolute top-0 right-0 p-8 opacity-5">
                                <i class="fas fa-quote-right text-8xl text-white"></i>
                            </div>
                            <div id="typed-text-content" class="relative z-10"></div>
                            <div id="signature-area" class="hidden mt-12 pt-8 border-t border-white/5 relative z-10"></div>
                        </div>
                    </div>
                </div>
            </div>
        `;

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        function createParticle() {
            particles.push({
                x: Math.random() * canvas.width,
                y: -10,
                size: Math.random() * 3 + 1,
                speed: Math.random() * 2 + 1,
                color: particleColors[Math.floor(Math.random() * particleColors.length)],
                opacity: Math.random()
            });
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, index) => {
                p.y += p.speed;
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
                ctx.fill();
                if (p.y > canvas.height) particles.splice(index, 1);
            });
            if (particles.length < 50) createParticle();
            requestAnimationFrame(animate);
        }

        function renderPage(pageName) {
            window.scrollTo(0, 0);
            contentArea.classList.add('opacity-0');
            setTimeout(() => {
                if (pageName === 'home') contentArea.innerHTML = homePageContent;
                else if (pageName === 'memories') contentArea.innerHTML = memoriesPageContent;
                else if (pageName === 'message') {
                    contentArea.innerHTML = messagePageContent;
                    setTimeout(attachMessageButtonListener, 100);
                }
                updateCountdown();
                setActiveNav(pageName);
                contentArea.classList.remove('opacity-0');
            }, 300);
        }

        function setActiveNav(pageName) {
            const navIds = ['home', 'memories', 'message'];
            navIds.forEach(id => {
                const elMobile = document.getElementById('nav-' + id);
                const elDesk = document.getElementById('nav-' + id + '-desktop');
                if (elMobile) elMobile.classList.toggle('text-secondary-blue', id === pageName);
                if (elDesk) elDesk.classList.toggle('bg-primary-blue', id === pageName);
            });
        }

        function updateCountdown() {
            const now = new Date().getTime();
            const distance = birthdayDate - now;
            if (distance > 0) {
                const d = Math.floor(distance / (86400000));
                const h = Math.floor((distance % 86400000) / 3600000);
                const m = Math.floor((distance % 3600000) / 60000);
                const s = Math.floor((distance % 60000) / 1000);
                ['days', 'hours', 'minutes', 'seconds'].forEach((id, i) => {
                    const el = document.getElementById(id);
                    if (el) el.innerText = [d, h, m, s][i];
                });
            }
        }

        async function typeMessage() {
            const container = document.getElementById('typed-text-content');
            const signatureArea = document.getElementById('signature-area');
            
            const lines = [
                { text: "Merhaba Çağlar,", style: "text-2xl font-bold mb-6 text-primary-blue" },
                { text: "Bugün senin doğum günün... Arkadaşların olarak her anında yanında olacağımızı bilmen adına böyle bir site yapmak istedik, umarız beğenmişsindir. ✨", style: "text-lg mb-4 text-gray-200 leading-relaxed" },
                { text: "Senin gibi dürüst, içten ve değerli birini tanımış olmak bizim için gerçekten büyük ve güzel bir şans. Doğum gününü en içten dileklerimizle kutluyoruz ve her zaman mutluluğunu diliyoruz. 🍀", style: "text-lg mb-4 text-gray-200 leading-relaxed" },
                { text: "Doğruları konuşmak gerekirse; kalbinin güzelliği hem yüzüne hem de mizahına vurmuş. Çok eğlenceli, güzel ve sevdiklerine değer veren birisin. Bu yüzden varlığın gerçekten içimizi ısıtıyor. 🔥", style: "text-lg mb-4 text-gray-200 leading-relaxed" },
                { text: "Kendi adıma (Tuna) konuşacak olursam; ne zaman moralim bozuk olsa beni bir şekilde güldürmeyi başardığın için sana tüm içtenliğimle teşekkür ederim. İyi ki arkadaşımsın, iyi ki arkadaşımızsın. 🙌", style: "text-lg mb-4 text-gray-200 leading-relaxed p-4 bg-white/5 rounded-2xl border-l-4 border-primary-blue italic" },
                { text: "Ve son olarak; bizler için çok değerli bir arkadaş olduğunu ve her zaman öyle olacağını hiçbir zaman unutma. 💎", style: "text-lg mb-4 text-gray-200 leading-relaxed" },
                { text: "İyi ki varsın Çağlar, iyi ki doğmuşsun, iyi ki seninle tanışmışız ve iyi ki bizimlesin. Daha nice yaşlar diliyorum ve yanaklarından öpüyorum. 🎂", style: "text-lg mb-4 text-gray-200 leading-relaxed font-semibold" }
            ];

            container.innerHTML = "";
            for (let lineObj of lines) {
                const p = document.createElement('p');
                p.className = lineObj.style;
                container.appendChild(p);
                for (let char of lineObj.text) {
                    p.innerHTML += char;
                    await new Promise(r => setTimeout(r, 35));
                }
                await new Promise(r => setTimeout(r, 400));
            }

            // İmza Bölümü
            signatureArea.classList.remove('hidden');
            signatureArea.classList.add('animate-fade-in');
            signatureArea.innerHTML = `
                <div class="flex flex-col items-end">
                    <span class="text-sm text-gray-400 mb-2 uppercase tracking-widest font-bold">Sevgilerimizle,</span>
                    <h3 class="font-cursive text-3xl md:text-5xl text-transparent bg-clip-text bg-gradient-to-r from-secondary-blue via-white to-accent-blue drop-shadow-[0_0_15px_rgba(56,189,248,0.5)] leading-snug">
                        Tuna, İsmet, Kumsal ve Benna...
                    </h3>
                </div>
            `;
        }

        function attachMessageButtonListener() {
            const btn = document.getElementById('show-message-btn');
            const box = document.getElementById('all-messages-container');
            if (btn) btn.onclick = () => {
                btn.style.transform = "scale(0.95)";
                btn.style.opacity = "0";
                setTimeout(() => {
                    btn.classList.add('hidden');
                    box.classList.remove('hidden');
                    typeMessage();
                }, 400);
            };
        }

        function createHeartButtons() {
            heartGrid.innerHTML = '';
            for (let i = 0; i < heartButtonCount; i++) {
                const b = document.createElement('button');
                b.className = 'star-btn aspect-square bg-gray-700 rounded-full flex items-center justify-center text-2xl text-primary-blue hover:bg-gray-600 transition-all';
                b.innerHTML = '<i class="fas fa-star"></i>';
                b.onclick = () => {
                    if (isPlaying) return;
                    userSequence.push(i);
                    b.classList.add('lighted-star');
                    setTimeout(() => b.classList.remove('lighted-star'), 400);
                    if (userSequence.length === sequence.length) {
                        if (userSequence.every((v, j) => v === sequence[j])) {
                            passwordPage.classList.add('password-page-hidden');
                            setTimeout(() => {
                                passwordPage.classList.add('hidden');
                                appContainer.classList.remove('hidden');
                                renderPage('home');
                            }, 500);
                        } else {
                            feedbackMessage.classList.remove('hidden');
                            userSequence = [];
                            setTimeout(() => feedbackMessage.classList.add('hidden'), 2000);
                        }
                    }
                };
                heartGrid.appendChild(b);
            }
        }

        startButton.onclick = () => {
            sequence = Array.from({length: 4}, () => Math.floor(Math.random() * 9));
            isPlaying = true;
            let step = 0;
            const btns = document.querySelectorAll('.star-btn');
            const interval = setInterval(() => {
                if (step < sequence.length) {
                    const b = btns[sequence[step]];
                    b.classList.add('lighted-star');
                    setTimeout(() => b.classList.remove('lighted-star'), 500);
                    step++;
                } else {
                    clearInterval(interval);
                    isPlaying = false;
                }
            }, 800);
        };

        ['home', 'memories', 'message'].forEach(p => {
            document.getElementById('nav-' + p).onclick = () => renderPage(p);
            document.getElementById('nav-' + p + '-desktop').onclick = () => renderPage(p);
        });

        window.onload = () => {
            resizeCanvas();
            animate();
            createHeartButtons();
            setInterval(updateCountdown, 1000);
        };
        window.onresize = resizeCanvas;
    </script>
</body>
</html>
