<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İyi ki Doğdun Çağlar</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Inter:wght@300;400;700;900&display=swap" rel="stylesheet">
    <!-- Font Awesome for icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        cursive: ['Dancing Script', 'cursive']
                    },
                    colors: {
                        'primary-blue': '#2563eb',
                        'secondary-blue': '#60a5fa',
                        'bg-dark': '#0f172a',
                        'card-dark': '#1e293b',
                        'text-light': '#f1f5f9',
                        'accent-blue': '#38bdf8',
                    },
                    animation: {
                        'fade-in': 'fadeIn 1s ease-in-out',
                        'pulse-grow': 'pulseGrow 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: 0, transform: 'translateY(20px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        },
                        pulseGrow: {
                            '0%, 100%': { transform: 'scale(1)' },
                            '50%': { transform: 'scale(1.05)' }
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0f172a;
            color: #f1f5f9;
        }
        canvas {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 1;
            pointer-events: none;
        }
        .ui-container {
            position: relative;
            z-index: 10;
        }
        .password-page-transition {
            transition: all 0.7s cubic-bezier(0.68, -0.55, 0.27, 1.55);
        }
        .password-page-hidden {
            transform: scale(0.8) translateY(-50px);
            opacity: 0;
            pointer-events: none;
        }
        /* Yıldız Buton Stilleri */
        .star-btn {
            aspect-ratio: 1 / 1;
            background-color: #334155;
            border-radius: 9999px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            color: #2563eb;
            transition: all 0.3s;
            border: 1px solid #475569;
            cursor: pointer;
            width: 100%;
            min-height: 60px;
        }
        .star-btn:hover {
            background-color: #475569;
        }
        .lighted-star {
            background-color: #60a5fa !important;
            color: white !important;
            box-shadow: 0 0 20px #60a5fa;
            transform: scale(1.1);
        }
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #2563eb;
            border-radius: 10px;
        }
    </style>
</head>
<body class="flex flex-col min-h-screen overflow-x-hidden">

    <canvas id="particles-canvas"></canvas>

    <div class="ui-container flex flex-col min-h-screen">
        <!-- Password Page -->
        <div id="password-page" class="flex flex-col items-center justify-center flex-1 p-4 text-center password-page-transition">
            <div class="w-full max-w-sm p-8 bg-card-dark rounded-3xl shadow-2xl backdrop-blur-md border border-gray-700">
                <h1 class="text-4xl md:text-5xl font-extrabold mb-4 text-secondary-blue drop-shadow-lg animate-pulse-grow">Merhaba, Çağlar!</h1>
                <p class="text-md text-gray-400 mb-6 font-light">
                    Siteye girmek için mavi yıldızları doğru sırayla takip et (yoğun güvenlikli)
                </p>
                
                <!-- SABİT YILDIZ GRİDİ (JavaScript'ten bağımsız, her zaman görünür) -->
                <div id="heart-grid" class="grid grid-cols-3 gap-4 max-w-xs mx-auto mb-6">
                    <button class="star-btn" data-index="0"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="1"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="2"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="3"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="4"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="5"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="6"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="7"><i class="fas fa-star"></i></button>
                    <button class="star-btn" data-index="8"><i class="fas fa-star"></i></button>
                </div>

                <button id="start-button" class="w-full py-3 rounded-2xl font-bold text-white bg-gradient-to-r from-primary-blue to-accent-blue hover:from-accent-blue hover:to-primary-blue transition-all duration-300 transform hover:scale-105 shadow-lg">
                    Şifreyi Göster
                </button>
                <p id="feedback-message" class="mt-4 text-red-400 font-medium opacity-0 transition-opacity">
                    Yanlış seçim, tekrar dene.
                </p>
            </div>
        </div>

        <!-- Main Application Container -->
        <div id="app-container" class="hidden flex-1 flex flex-col p-4 md:p-8 relative">
            <div id="content-area" class="flex-1 flex flex-col items-center justify-center text-center p-4 overflow-y-auto custom-scrollbar pb-24"></div>

            <!-- Mobile Navigation -->
            <nav class="fixed bottom-0 left-0 w-full bg-card-dark bg-opacity-90 backdrop-blur-lg border-t border-gray-700 flex justify-around items-center h-20 shadow-2xl z-20 md:hidden">
                <button id="nav-home" class="flex-1 flex flex-col items-center justify-center text-xs text-secondary-blue font-semibold">
                    <i class="fas fa-home text-xl mb-1"></i>
                    <span>Menü</span>
                </button>
                <button id="nav-memories" class="flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold">
                    <i class="fas fa-camera text-xl mb-1"></i>
                    <span>Anılar</span>
                </button>
                <button id="nav-message" class="flex-1 flex flex-col items-center justify-center text-xs text-gray-400 font-semibold">
                    <i class="fas fa-envelope-open-text text-xl mb-1"></i>
                    <span>Mesaj</span>
                </button>
            </nav>

            <!-- Desktop Navigation -->
            <nav class="hidden md:flex fixed bottom-6 left-0 right-0 w-full justify-center z-20">
                <div class="flex gap-4 p-2 bg-card-dark rounded-full shadow-2xl border border-gray-700 backdrop-blur-lg">
                    <button id="nav-home-desktop" class="px-8 py-2 rounded-full text-text-light font-bold bg-primary-blue shadow-lg">
                        <i class="fas fa-home mr-2"></i> Menü
                    </button>
                    <button id="nav-memories-desktop" class="px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700 transition-colors">
                        <i class="fas fa-camera mr-2"></i> Anılar
                    </button>
                    <button id="nav-message-desktop" class="px-8 py-2 rounded-full text-text-light font-bold hover:bg-gray-700 transition-colors">
                        <i class="fas fa-envelope-open-text mr-2"></i> Mesajlar
                    </button>
                </div>
            </nav>
        </div>
    </div>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Firebase Setup
        const firebaseConfig = JSON.parse(__firebase_config);
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-app-id';
        let user = null;

        // Auth
        const initAuth = async () => {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await signInWithCustomToken(auth, __initial_auth_token);
            } else {
                await signInAnonymously(auth);
            }
        };
        initAuth();
        onAuthStateChanged(auth, (u) => { user = u; });

        // App Logic
        const birthdayDate = new Date('April 26, 2026 00:00:00').getTime();
        let sequence = [];
        let userSequence = [];
        let isPlaying = false;
        
        const passwordPage = document.getElementById('password-page');
        const appContainer = document.getElementById('app-container');
        const startButton = document.getElementById('start-button');
        const feedbackMessage = document.getElementById('feedback-message');
        const contentArea = document.getElementById('content-area');
        const starButtons = document.querySelectorAll('.star-btn');

        // Particle System
        const canvas = document.getElementById('particles-canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
        function createParticle() {
            particles.push({
                x: Math.random() * canvas.width, y: -10,
                size: Math.random() * 3 + 1, speed: Math.random() * 2 + 1,
                color: ['#2563eb', '#60a5fa', '#38bdf8'][Math.floor(Math.random() * 3)],
                opacity: Math.random()
            });
        }
        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p, i) => {
                p.y += p.speed;
                ctx.globalAlpha = p.opacity;
                ctx.fillStyle = p.color;
                ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2); ctx.fill();
                if (p.y > canvas.height) particles.splice(i, 1);
            });
            if (particles.length < 40) createParticle();
            requestAnimationFrame(animate);
        }

        // Navigation
        function renderPage(page) {
            contentArea.classList.add('opacity-0');
            setTimeout(() => {
                if (page === 'home') contentArea.innerHTML = `
                    <div class="w-full max-w-5xl animate-fade-in">
                        <h1 class="text-5xl md:text-7xl font-extrabold text-primary-blue mb-4">İyi ki Doğdun, Çağlar!</h1>
                        <p class="text-xl md:text-3xl font-light text-text-light mb-12">26 Nisan 2026'ya sadece...</p>
                        <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                            ${['Gün', 'Saat', 'Dakika', 'Saniye'].map(label => `
                                <div class="bg-card-dark p-6 rounded-2xl border border-gray-700 shadow-xl">
                                    <span id="${label.toLowerCase()}" class="text-4xl md:text-5xl font-black text-accent-blue block">0</span>
                                    <span class="text-xs text-gray-400 uppercase tracking-widest">${label}</span>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
                else if (page === 'memories') contentArea.innerHTML = `
                    <div class="w-full max-w-4xl animate-fade-in">
                        <div class="bg-card-dark rounded-3xl p-8 border border-gray-700 mb-8">
                            <h2 class="text-3xl font-bold text-primary-blue mb-4">Anılar</h2>
                            <p class="text-gray-400 italic">Şu an burası senin için hazırlık aşamasında. Fotoğraflar yakında burada belirecek!</p>
                        </div>
                        <i class="fas fa-images text-8xl opacity-10"></i>
                    </div>
                `;
                else if (page === 'message') {
                    contentArea.innerHTML = `
                        <div class="w-full max-w-2xl animate-fade-in">
                            <h2 class="text-3xl font-bold text-white mb-6">Çağlar'a Mesaj Bırak</h2>
                            <div class="bg-card-dark p-6 rounded-3xl border border-gray-700 shadow-xl mb-8">
                                <input id="sender-name" type="text" placeholder="Adınız" class="w-full bg-slate-800 text-white rounded-xl px-4 py-3 mb-4 outline-none">
                                <textarea id="sender-message" placeholder="Mesajınız..." class="w-full bg-slate-800 text-white rounded-xl px-4 py-3 mb-4 outline-none h-24"></textarea>
                                <button id="send-message-btn" class="w-full py-3 bg-primary-blue text-white font-bold rounded-xl">Gönder <i class="fas fa-paper-plane ml-2"></i></button>
                            </div>
                            <div id="messages-display" class="space-y-4 text-left overflow-y-auto max-h-[400px] pr-2 custom-scrollbar"></div>
                        </div>
                    `;
                    initMessageSystem();
                }
                updateCountdown();
                contentArea.classList.remove('opacity-0');
            }, 200);
        }

        // Message System
        function initMessageSystem() {
            if (!user) return;
            const btn = document.getElementById('send-message-btn');
            const display = document.getElementById('messages-display');
            const col = collection(db, 'artifacts', appId, 'public', 'data', 'messages');

            onSnapshot(col, (snap) => {
                const msgs = [];
                snap.forEach(d => msgs.push(d.data()));
                msgs.sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
                display.innerHTML = msgs.map(m => `
                    <div class="bg-slate-800/60 p-4 rounded-2xl border border-gray-700">
                        <div class="flex justify-between mb-1"><span class="font-bold text-accent-blue">${m.name}</span></div>
                        <p class="text-gray-300 italic text-sm">"${m.text}"</p>
                    </div>
                `).join('') || '<p class="text-center text-gray-500">İlk mesajı sen yaz!</p>';
            }, (e) => console.error(e));

            btn.onclick = async () => {
                const name = document.getElementById('sender-name').value.trim();
                const text = document.getElementById('sender-message').value.trim();
                if (!name || !text) return;
                btn.disabled = true;
                await addDoc(col, { name, text, timestamp: serverTimestamp(), uid: user.uid });
                document.getElementById('sender-name').value = "";
                document.getElementById('sender-message').value = "";
                btn.disabled = false;
            };
        }

        // Countdown
        function updateCountdown() {
            const distance = birthdayDate - new Date().getTime();
            if (distance > 0) {
                const d = Math.floor(distance / 86400000);
                const h = Math.floor((distance % 86400000) / 3600000);
                const m = Math.floor((distance % 3600000) / 60000);
                const s = Math.floor((distance % 60000) / 1000);
                if (document.getElementById('gün')) {
                    document.getElementById('gün').innerText = d;
                    document.getElementById('saat').innerText = h;
                    document.getElementById('dakika').innerText = m;
                    document.getElementById('saniye').innerText = s;
                }
            }
        }

        // Yıldız Şifre Mantığı
        starButtons.forEach((btn, i) => {
            btn.onclick = () => {
                if (isPlaying) return;
                userSequence.push(i);
                btn.classList.add('lighted-star');
                setTimeout(() => btn.classList.remove('lighted-star'), 400);
                
                if (userSequence.length === sequence.length) {
                    if (userSequence.every((v, j) => v === sequence[j])) {
                        passwordPage.classList.add('password-page-hidden');
                        setTimeout(() => {
                            passwordPage.classList.add('hidden');
                            appContainer.classList.remove('hidden');
                            renderPage('home');
                        }, 500);
                    } else {
                        feedbackMessage.style.opacity = 1;
                        userSequence = [];
                        setTimeout(() => feedbackMessage.style.opacity = 0, 2000);
                    }
                }
            };
        });

        startButton.onclick = () => {
            if (isPlaying) return;
            sequence = Array.from({length: 4}, () => Math.floor(Math.random() * 9));
            userSequence = [];
            isPlaying = true;
            let step = 0;
            const interval = setInterval(() => {
                if (step < sequence.length) {
                    const b = starButtons[sequence[step]];
                    b.classList.add('lighted-star');
                    setTimeout(() => b.classList.remove('lighted-star'), 500);
                    step++;
                } else {
                    clearInterval(interval);
                    isPlaying = false;
                }
            }, 800);
        };

        // Init
        window.onload = () => { resizeCanvas(); animate(); setInterval(updateCountdown, 1000); };
        window.onresize = resizeCanvas;
        document.getElementById('nav-home').onclick = () => renderPage('home');
        document.getElementById('nav-memories').onclick = () => renderPage('memories');
        document.getElementById('nav-message').onclick = () => renderPage('message');
        document.getElementById('nav-home-desktop').onclick = () => renderPage('home');
        document.getElementById('nav-memories-desktop').onclick = () => renderPage('memories');
        document.getElementById('nav-message-desktop').onclick = () => renderPage('message');
    </script>
</body>
</html>
